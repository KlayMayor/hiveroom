<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini 이미지 생성 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --honey: #F2B830;
    --hdk: #A87800;
    --bg: #FDFAF4;
    --card: #fff;
    --border: #EDE8DC;
    --text: #2A2015;
    --muted: #8A7A60;
    --hlt: #FFF8E8;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-family: 'Jua', sans-serif;
    font-size: 26px;
    color: var(--hdk);
    margin-bottom: 6px;
  }
  .header p {
    font-size: 12px;
    color: var(--muted);
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.04);
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type=text], input[type=password], textarea, select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: var(--bg);
    transition: border-color .15s;
    color: var(--text);
  }
  input:focus, textarea:focus, select:focus { border-color: var(--honey); }
  textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row > * { flex: 1; }
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all .15s;
    margin-top: 4px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--honey), #E8A020);
    color: #fff;
    box-shadow: 0 4px 14px rgba(242,184,48,.4);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(242,184,48,.5); }
  .btn-primary:disabled { background: #DDD; color: #AAA; box-shadow: none; transform: none; cursor: not-allowed; }
  .btn-secondary {
    background: var(--hlt);
    color: var(--hdk);
    border: 1.5px solid var(--border);
    font-size: 13px;
    margin-top: 8px;
  }
  .btn-secondary:hover { background: #FFF0C0; }

  /* 결과 영역 */
  .result-area {
    display: none;
    text-align: center;
  }
  .result-area.show { display: block; }
  .result-img-wrap {
    position: relative;
    display: inline-block;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
    margin-bottom: 14px;
  }
  .result-img-wrap img,
  .result-img-wrap canvas {
    display: block;
    width: 100%;
    max-width: 400px;
    height: auto;
    border-radius: var(--radius);
  }
  .hex-mask-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 14px;
    color: var(--text);
  }
  .hex-mask-row input[type=checkbox] {
    width: 16px;
    height: 16px;
    accent-color: var(--hdk);
    cursor: pointer;
  }
  .hex-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .hex-mask {
    width: 200px;
    height: 200px;
    opacity: .15;
  }

  /* 상태 표시 */
  .status-box {
    display: none;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 12px;
    margin-top: 12px;
    line-height: 1.6;
  }
  .status-box.show { display: block; }
  .status-loading { background: #F0F8FF; border: 1px solid #C0D8F0; color: #3A6FA0; }
  .status-error   { background: #FFF0F0; border: 1px solid #F0C0C0; color: #A03030; }
  .status-success { background: #F0FFF4; border: 1px solid #A0E0B0; color: #207040; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #C0D8F0;
    border-top-color: #3A6FA0;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .meta-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .meta-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--hlt);
    color: var(--hdk);
    font-weight: 600;
  }
  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.7;
    background: var(--hlt);
    padding: 8px 12px;
    border-radius: 10px;
  }
  .model-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    margin-left: 6px;
    vertical-align: middle;
  }
  .tag-free { background: #E8FFE8; color: #208040; }
  .tag-paid { background: #FFF0E8; color: #A04020; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🍯 Gemini 이미지 생성 테스트</h1>
    <p>HiveRoom 연동 전 API 동작 확인용</p>
  </div>

  <!-- API 키 -->
  <div class="card">
    <div class="card-title">🔑 API 설정</div>

    <label>모델 선택</label>
    <select id="model-select" onchange="onModelChange(this.value)">
      <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview</option>
      <option value="ernie-image-turbo">ERNIE-Image-Turbo (무료 · HuggingFace)</option>
    </select>

    <div id="gemini-key-section">
      <label style="margin-top:14px;">Gemini API Key</label>
      <input type="password" id="api-key" placeholder="AIza...">
      <div class="hint" style="margin-top:8px;">
        🔗 <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--hdk);">Google AI Studio</a>에서 무료 발급 가능해요.<br>
        이 페이지는 로컬에서만 사용하며 키가 전송되지 않아요.
      </div>
    </div>

    <div id="ernie-hint-section" style="display:none;">
      <div class="hint" style="margin-top:12px;">
        🤗 HuggingFace Space를 이용합니다. <strong>API 키 없이 무료</strong>로 사용 가능해요.<br>
        Space가 유휴 상태이면 처음 요청 시 30~60초 소요될 수 있어요.
      </div>
    </div>
  </div>

  <!-- 프롬프트 -->
  <div class="card">
    <div class="card-title">✏️ 프롬프트</div>
    <textarea id="prompt" readonly style="background:#F5F5F5;color:#888;cursor:default;">Cute isometric illustration, fit inside a pointy-top regular hexagon, The hexagon proportions are width:height = √3:2 (approximately 0.87:1), meaning it is taller than it is wide. Design the isometric interior so it fills this vertically-oriented hexagonal boundary — wider in the middle, narrowing toward the top and bottom points. The overall canvas is square (1:1), with the hexagon centered and occupying about 87% of the canvas width. diamond shaped floor area, wall are divided 1:1 left and right side, vivid colors highlighted, kawaii cute Japanese inspired style, interior image without people, isometric 3/4 front view, white background,</textarea>
  </div>

  <!-- 생성 버튼 -->
  <button class="btn btn-primary" id="gen-btn" onclick="generateImage()">✨ 이미지 생성하기</button>

  <!-- 상태 -->
  <div class="status-box" id="status-box"></div>

  <!-- 결과 -->
  <div class="card result-area" id="result-area" style="margin-top:16px;">
    <div class="card-title">🎨 생성 결과</div>
    <div class="hex-mask-row">
      <input type="checkbox" id="hex-mask" checked
        onchange="if(window._lastImgSrc) applyCanvas(window._lastImgSrc)">
      <label for="hex-mask" style="cursor:pointer;">🔷 육각형 마스킹 적용</label>
    </div>
    <div class="result-img-wrap">
      <canvas id="result-canvas" width="1024" height="1024"></canvas>
    </div>
    <div class="meta-row" id="meta-row"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" style="margin:0;" onclick="downloadImg()">⬇️ 다운로드</button>
      <button class="btn btn-secondary" style="margin:0;" onclick="generateImage()">🔄 다시 생성</button>
    </div>
  </div>

</div>

<script>
function onModelChange(model) {
  const isERNIE = model === 'ernie-image-turbo';
  document.getElementById('gemini-key-section').style.display = isERNIE ? 'none' : '';
  document.getElementById('ernie-hint-section').style.display  = isERNIE ? 'block' : 'none';
}

function setPrompt(text){
  document.getElementById('prompt').value = text;
}

function showStatus(type, msg){
  const el = document.getElementById('status-box');
  el.className = `status-box show status-${type}`;
  el.innerHTML = type === 'loading'
    ? `<span class="spinner"></span>${msg}`
    : msg;
}
function hideStatus(){
  document.getElementById('status-box').classList.remove('show');
}

async function generateImage(){
  const key    = document.getElementById('api-key').value.trim();
  const model  = document.getElementById('model-select').value;
  const prompt = document.getElementById('prompt').value.trim();

  if(model !== 'ernie-image-turbo' && !key) { showStatus('error', '❌ API 키를 입력해주세요.'); return; }
  if(!prompt) { showStatus('error', '❌ 프롬프트를 입력해주세요.'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('result-area').classList.remove('show');
  showStatus('loading', '이미지 생성 중... (5~15초 소요)');

  try {
    let imageBase64 = null;
    let mimeType = 'image/png';
    let usedModel = model;

    if(model === 'ernie-image-turbo'){
      // ── ERNIE-Image-Turbo (HuggingFace Space, 무료) ──
      showStatus('loading', '🤗 HuggingFace Space 연결 중...');
      const { Client } = await import('https://esm.sh/@gradio/client');
      const client = await Client.connect('baidu/ERNIE-Image-Turbo');
      showStatus('loading', '🎨 이미지 생성 중... (15~60초 소요)');
      const result = await client.predict('/predict', [prompt]);

      const imgData = result.data?.[0];
      let imgUrl = typeof imgData === 'string' ? imgData
        : (imgData?.url || (imgData?.path ? `https://baidu-ernie-image-turbo.hf.space/file=${imgData.path}` : null));

      if(!imgUrl) throw new Error('이미지 URL을 가져오지 못했어요. 응답: ' + JSON.stringify(result.data).slice(0,200));

      // Fetch image → base64 (canvas CORS 문제 방지)
      showStatus('loading', '⬇️ 이미지 다운로드 중...');
      const imgRes = await fetch(imgUrl);
      if(!imgRes.ok) throw new Error(`이미지 다운로드 실패 (HTTP ${imgRes.status})`);
      const blob = await imgRes.blob();
      imageBase64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      mimeType = blob.type || 'image/png';

    } else if(model.startsWith('imagen-')){
      // ── Imagen 3 (유료) — generateImages 엔드포인트 사용 ──
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateImages?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: prompt,
            sampleCount: 1,
            aspectRatio: '1:1',
            outputMimeType: 'image/jpeg'
          })
        }
      );
      if(!res.ok){
        const err = await res.json();
        const msg = err?.error?.message || `HTTP ${res.status}`;
        if(res.status === 400 || res.status === 403 || res.status === 404){
          throw new Error(msg + '\n💡 Imagen 3은 결제 수단이 등록된 Google AI Studio 계정이 필요합니다.');
        }
        throw new Error(msg);
      }
      const data = await res.json();
      // generateImages 응답 형식: generatedImages[].image.imageBytes
      const imgObj = data?.generatedImages?.[0];
      imageBase64 = imgObj?.image?.imageBytes ?? imgObj?.bytesBase64Encoded;
      mimeType = imgObj?.mimeType ?? imgObj?.image?.mimeType ?? 'image/jpeg';

    } else {
      // ── Gemini (generateContent) ──
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: prompt }]
            }],
            generationConfig: {
              responseModalities: ['TEXT', 'IMAGE'],
            }
          })
        }
      );
      if(!res.ok){
        const err = await res.json();
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      // 이미지 파트 찾기
      const parts = data?.candidates?.[0]?.content?.parts || [];
      const imgPart = parts.find(p => p.inlineData?.mimeType?.startsWith('image/'));
      if(!imgPart) throw new Error('이미지가 반환되지 않았어요. 모델이 텍스트만 반환했을 수 있어요.');
      imageBase64 = imgPart.inlineData.data;
      mimeType = imgPart.inlineData.mimeType;
    }

    if(!imageBase64) throw new Error('이미지 데이터가 없어요.');

    // 결과 표시
    const src = `data:${mimeType};base64,${imageBase64}`;
    window._lastImgSrc = src;
    window._lastMime = mimeType;

    document.getElementById('meta-row').innerHTML = `
      <span class="meta-badge">모델: ${usedModel.split('-').slice(0,3).join('-')}</span>
      <span class="meta-badge">형식: ${mimeType}</span>
      <span class="meta-badge">✅ 생성 완료</span>
    `;
    document.getElementById('result-area').classList.add('show');
    showStatus('success', '✅ 이미지 생성 성공! HiveRoom 연동이 가능해요.');

    applyCanvas(src);

  } catch(e){
    showStatus('error', `❌ 오류: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}

function applyCanvas(src) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.getElementById('result-canvas');
    const ctx = canvas.getContext('2d');
    const size = 1024;
    canvas.width = size;
    canvas.height = size;
    ctx.clearRect(0, 0, size, size);

    if (document.getElementById('hex-mask').checked) {
      // White background outside hexagon
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      // Clip to pointy-top regular hexagon: center (512,512), r=480
      ctx.save();
      ctx.beginPath();
      const cx = 512, cy = 512, r = 480;
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2; // start at top
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, 0, 0, size, size);
      ctx.restore();
    } else {
      ctx.drawImage(img, 0, 0, size, size);
    }
  };
  img.src = src;
}

function downloadImg(){
  if(!window._lastImgSrc) return;
  const canvas = document.getElementById('result-canvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `gemini_room_${Date.now()}.png`;
  a.click();
}
</script>
</body>
</html>
