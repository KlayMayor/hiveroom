<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini 이미지 생성 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --honey: #F2B830;
    --hdk: #A87800;
    --bg: #FDFAF4;
    --card: #fff;
    --border: #EDE8DC;
    --text: #2A2015;
    --muted: #8A7A60;
    --hlt: #FFF8E8;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px;
  }
  .container {
    max-width: 640px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-family: 'Jua', sans-serif;
    font-size: 26px;
    color: var(--hdk);
    margin-bottom: 6px;
  }
  .header p {
    font-size: 12px;
    color: var(--muted);
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.04);
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type=text], input[type=password], textarea, select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: var(--bg);
    transition: border-color .15s;
    color: var(--text);
  }
  input:focus, textarea:focus, select:focus { border-color: var(--honey); }
  textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row > * { flex: 1; }
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 12px;
    font-family: 'Jua', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all .15s;
    margin-top: 4px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--honey), #E8A020);
    color: #fff;
    box-shadow: 0 4px 14px rgba(242,184,48,.4);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(242,184,48,.5); }
  .btn-primary:disabled { background: #DDD; color: #AAA; box-shadow: none; transform: none; cursor: not-allowed; }
  .btn-secondary {
    background: var(--hlt);
    color: var(--hdk);
    border: 1.5px solid var(--border);
    font-size: 13px;
    margin-top: 8px;
  }
  .btn-secondary:hover { background: #FFF0C0; }

  /* 결과 영역 */
  .result-area {
    display: none;
    text-align: center;
  }
  .result-area.show { display: block; }
  .result-img-wrap {
    position: relative;
    display: inline-block;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
    margin-bottom: 14px;
  }
  .result-img-wrap img,
  .result-img-wrap canvas {
    display: block;
    width: 100%;
    max-width: 400px;
    height: auto;
    border-radius: var(--radius);
  }
  .hex-mask-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 14px;
    color: var(--text);
  }
  .hex-mask-row input[type=checkbox] {
    width: 16px;
    height: 16px;
    accent-color: var(--hdk);
    cursor: pointer;
  }
  .hex-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .hex-mask {
    width: 200px;
    height: 200px;
    opacity: .15;
  }

  /* 상태 표시 */
  .status-box {
    display: none;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 12px;
    margin-top: 12px;
    line-height: 1.6;
  }
  .status-box.show { display: block; }
  .status-loading { background: #F0F8FF; border: 1px solid #C0D8F0; color: #3A6FA0; }
  .status-error   { background: #FFF0F0; border: 1px solid #F0C0C0; color: #A03030; }
  .status-success { background: #F0FFF4; border: 1px solid #A0E0B0; color: #207040; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #C0D8F0;
    border-top-color: #3A6FA0;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .meta-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .meta-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--hlt);
    color: var(--hdk);
    font-weight: 600;
  }
  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.7;
    background: var(--hlt);
    padding: 8px 12px;
    border-radius: 10px;
  }
  .model-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    margin-left: 6px;
    vertical-align: middle;
  }
  .tag-free { background: #E8FFE8; color: #208040; }
  .tag-paid { background: #FFF0E8; color: #A04020; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🍯 Gemini 이미지 생성 테스트</h1>
    <p>HiveRoom 연동 전 API 동작 확인용</p>
  </div>

  <!-- API 키 -->
  <div class="card">
    <div class="card-title">🔑 API 설정</div>

    <label>모델 선택</label>
    <select id="model-select" onchange="onModelChange(this.value)">
      <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview</option>
      <option value="ernie-image-turbo">ERNIE-Image-Turbo (무료 · HuggingFace)</option>
    </select>

    <div id="gemini-key-section">
      <label style="margin-top:14px;">Gemini API Key</label>
      <input type="password" id="api-key" placeholder="AIza...">
      <div class="hint" style="margin-top:8px;">
        🔗 <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--hdk);">Google AI Studio</a>에서 무료 발급 가능해요.<br>
        이 페이지는 로컬에서만 사용하며 키가 전송되지 않아요.
      </div>
    </div>

    <div id="ernie-hint-section" style="display:none;">
      <label style="margin-top:14px;">로컬 서버 URL</label>
      <input type="text" id="ernie-server-url" value="http://127.0.0.1:7860" placeholder="http://127.0.0.1:7860">
      <div class="hint" style="margin-top:8px;">
        🖥️ Draw Things 앱 → 설정 → <strong>API 서버 활성화</strong> 후 사용하세요.<br>
        모델: ERNIE-Image-Turbo 선택 필요.<br>
        Cloudflare Tunnel 사용 시 터널 URL을 입력하세요.
      </div>
    </div>
  </div>

  <!-- 프롬프트 -->
  <div class="card">
    <div class="card-title">✏️ 프롬프트</div>

    <!-- 이미지 규격 — 숨김 -->
    <textarea id="base-prompt" style="display:none;">Cute kawaii isometric room illustration. Isometric 3D view of a room corner: a diamond-shaped floor at the bottom, a left wall and a right wall meeting at the top-center back corner. The scene naturally forms a hexagonal outline — one point at the very top, one point at the very bottom. White background. No people. Vivid pastel colors, Japanese kawaii cute style,</textarea>

    <!-- 빠른 선택 드롭다운 -->
    <label>이미지 설명</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <div>
        <label style="margin-bottom:4px;">🏠 Room</label>
        <select id="sel-room" onchange="buildPrompt()">
          <option value="">선택</option>
          <option value="bedroom">🛏️ Bedroom</option>
          <option value="living room">🛋️ Living room</option>
          <option value="game room">🎮 Game room</option>
          <option value="library room">📚 Library room</option>
          <option value="study room">💻 Study room</option>
          <option value="kitchen">🍳 Kitchen</option>
          <option value="dining room">🍽️ Dining room</option>
          <option value="music room">🎵 Music room</option>
          <option value="art studio">🎨 Art studio</option>
          <option value="kids room">🧸 Kids room</option>
          <option value="walk-in closet">👗 Walk-in closet</option>
        </select>
      </div>
      <div>
        <label style="margin-bottom:4px;">🌈 Mood</label>
        <select id="sel-mood" onchange="buildPrompt()">
          <option value="">선택</option>
          <option value="cozy">🏡 Cozy</option>
          <option value="delighted">😊 Delighted</option>
          <option value="light and airy">☀️ Light &amp; Airy</option>
          <option value="dark and moody">🌑 Dark &amp; Moody</option>
          <option value="colorful and vivid">🌈 Colorful &amp; Vivid</option>
          <option value="clean and minimal">✨ Clean &amp; Minimal</option>
          <option value="romantic">💕 Romantic</option>
          <option value="retro">📺 Retro</option>
          <option value="futuristic">🚀 Futuristic</option>
          <option value="nature-inspired">🌿 Nature-inspired</option>
        </select>
      </div>
      <div>
        <label style="margin-bottom:4px;">🖼️ Wall decorated with</label>
        <select id="sel-wall" onchange="buildPrompt()">
          <option value="">선택</option>
          <option value="bright lights">💡 Bright lights</option>
          <option value="paintings">🖼️ Paintings</option>
          <option value="neon signs">🪩 Neon signs</option>
          <option value="large windows">🪟 Large windows</option>
          <option value="glass panels">🔲 Glass panels</option>
          <option value="bookshelves">📚 Bookshelves</option>
          <option value="hanging plants">🌿 Hanging plants</option>
          <option value="fairy lights">✨ Fairy lights</option>
          <option value="photo frames">🖼️ Photo frames</option>
          <option value="mirrors">🪞 Mirrors</option>
          <option value="tapestry">🎨 Tapestry</option>
        </select>
      </div>
      <div>
        <label style="margin-bottom:4px;">🪑 Furnitures</label>
        <select id="sel-furniture" onchange="buildPrompt()">
          <option value="">선택</option>
          <option value="sofa and coffee table">🛋️ Sofa &amp; Coffee table</option>
          <option value="bed and nightstand">🛏️ Bed &amp; Nightstand</option>
          <option value="computer desk and chair">💻 Computer desk &amp; Chair</option>
          <option value="dining table and chairs">🪑 Dining table &amp; Chairs</option>
          <option value="bookshelf and armchair">📚 Bookshelf &amp; Armchair</option>
          <option value="gaming setup with RGB lighting">🎮 Gaming setup</option>
          <option value="kitchen counter and bar stools">🍳 Kitchen counter &amp; Stools</option>
          <option value="wardrobe and dresser">👗 Wardrobe &amp; Dresser</option>
          <option value="study desk and lamp">📖 Study desk &amp; Lamp</option>
          <option value="piano and music stand">🎹 Piano &amp; Music stand</option>
        </select>
      </div>
    </div>
    <textarea id="prompt" placeholder="또는 직접 입력하세요..."></textarea>
  </div>

  <!-- 생성 버튼 -->
  <button class="btn btn-primary" id="gen-btn" onclick="generateImage()">✨ 이미지 생성하기</button>

  <!-- 상태 -->
  <div class="status-box" id="status-box"></div>

  <!-- 결과 -->
  <div class="card result-area" id="result-area" style="margin-top:16px;">
    <div class="card-title">🎨 생성 결과</div>
    <div class="hex-mask-row">
      <input type="checkbox" id="hex-mask" checked
        onchange="if(window._lastImgSrc) applyCanvas(window._lastImgSrc)">
      <label for="hex-mask" style="cursor:pointer;">🔷 육각형 마스킹 적용</label>
    </div>
    <div class="result-img-wrap">
      <canvas id="result-canvas" width="1024" height="1024"></canvas>
    </div>
    <div class="meta-row" id="meta-row"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" style="margin:0;" onclick="downloadImg()">⬇️ 다운로드</button>
      <button class="btn btn-secondary" style="margin:0;" onclick="generateImage()">🔄 다시 생성</button>
    </div>
  </div>

</div>

<script>
function onModelChange(model) {
  const isERNIE = model === 'ernie-image-turbo';
  document.getElementById('gemini-key-section').style.display = isERNIE ? 'none' : '';
  document.getElementById('ernie-hint-section').style.display  = isERNIE ? 'block' : 'none';
}

function buildPrompt() {
  const room      = document.getElementById('sel-room').value;
  const mood      = document.getElementById('sel-mood').value;
  const wall      = document.getElementById('sel-wall').value;
  const furniture = document.getElementById('sel-furniture').value;
  if (!room && !mood && !wall && !furniture) return;
  let sentence = (mood ? mood + ' ' : '') + (room || '');
  if (wall)      sentence += ' with ' + wall + ' on wall';
  if (furniture) sentence += ', ' + furniture + ' placed';
  document.getElementById('prompt').value = sentence.trim();
}

function setPrompt(text){
  document.getElementById('prompt').value = text;
}

function showStatus(type, msg){
  const el = document.getElementById('status-box');
  el.className = `status-box show status-${type}`;
  el.innerHTML = type === 'loading'
    ? `<span class="spinner"></span>${msg}`
    : msg;
}
function hideStatus(){
  document.getElementById('status-box').classList.remove('show');
}

async function generateImage(){
  const key         = document.getElementById('api-key').value.trim();
  const model       = document.getElementById('model-select').value;
  const basePrompt  = document.getElementById('base-prompt').value.trim();
  const userPrompt  = document.getElementById('prompt').value.trim();
  const prompt      = userPrompt ? basePrompt + ' ' + userPrompt : basePrompt;

  if(model !== 'ernie-image-turbo' && !key) { showStatus('error', '❌ API 키를 입력해주세요.'); return; }
  if(!userPrompt){ showStatus('error', '❌ 이미지 설명을 입력해주세요.'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('result-area').classList.remove('show');
  showStatus('loading', '이미지 생성 중... (최대 2분 소요)');

  const abort = new AbortController();
  const timer = setTimeout(() => abort.abort(), 120_000);

  try {
    let imageBase64 = null;
    let mimeType = 'image/png';
    let usedModel = model;

    if(model === 'ernie-image-turbo'){
      // ── ERNIE-Image-Turbo (Draw Things API — AUTOMATIC1111 호환) ──
      const serverUrl = (document.getElementById('ernie-server-url').value || 'http://127.0.0.1:7860').replace(/\/$/, '');

      showStatus('loading', '🎨 Draw Things로 이미지 생성 중...');
      const res = await fetch(`${serverUrl}/sdapi/v1/txt2img`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abort.signal,
        body: JSON.stringify({
          prompt,
          steps: 9,
          width: 640,
          height: 640,
          cfg_scale: 1
        })
      });

      if(!res.ok){
        let errMsg = `HTTP ${res.status}`;
        try { const e = await res.json(); errMsg = e?.error || e?.detail || JSON.stringify(e); } catch{}
        if(res.status === 0 || !res.ok) errMsg = `서버 연결 실패. Draw Things API 서버가 활성화되어 있는지 확인해주세요. (${errMsg})`;
        throw new Error(errMsg);
      }

      const data = await res.json();
      const b64 = data?.images?.[0];
      if(!b64) throw new Error('이미지 데이터 없음. 응답: ' + JSON.stringify(data).slice(0, 200));
      imageBase64 = b64;
      mimeType = 'image/png';

    } else if(model.startsWith('imagen-')){
      // ── Imagen 3 (유료) — generateImages 엔드포인트 ──
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateImages?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: prompt,
            sampleCount: 1,
            aspectRatio: '1:1',
            outputMimeType: 'image/jpeg'
          })
        }
      );
      if(!res.ok){
        const err = await res.json();
        const msg = err?.error?.message || `HTTP ${res.status}`;
        if(res.status === 400 || res.status === 403 || res.status === 404){
          throw new Error(msg + '\n💡 Imagen 3은 결제 수단이 등록된 Google AI Studio 계정이 필요합니다.');
        }
        throw new Error(msg);
      }
      const data = await res.json();
      const imgObj = data?.generatedImages?.[0];
      imageBase64 = imgObj?.image?.imageBytes ?? imgObj?.bytesBase64Encoded;
      mimeType = imgObj?.mimeType ?? imgObj?.image?.mimeType ?? 'image/jpeg';

    } else {
      // ── Gemini (generateContent) ──
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: abort.signal,
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
          })
        }
      );
      if(!res.ok){
        let errMsg = `HTTP ${res.status}`;
        try { const e = await res.json(); errMsg = e?.error?.message || errMsg; } catch{}
        throw new Error(errMsg);
      }
      const data = await res.json();
      const parts = data?.candidates?.[0]?.content?.parts || [];
      const imgPart = parts.find(p => p.inlineData?.mimeType?.startsWith('image/'));
      if(!imgPart){
        const textPart = parts.find(p => p.text);
        throw new Error('이미지가 반환되지 않았어요.' + (textPart ? ' 모델 응답: ' + textPart.text.slice(0,100) : ''));
      }
      imageBase64 = imgPart.inlineData.data;
      mimeType = imgPart.inlineData.mimeType;
    }

    if(!imageBase64) throw new Error('이미지 데이터가 없어요.');

    // 결과 표시
    const src = `data:${mimeType};base64,${imageBase64}`;
    window._lastImgSrc = src;
    window._lastMime = mimeType;

    document.getElementById('meta-row').innerHTML = `
      <span class="meta-badge">모델: ${usedModel.split('-').slice(0,3).join('-')}</span>
      <span class="meta-badge">형식: ${mimeType}</span>
      <span class="meta-badge">✅ 생성 완료</span>
    `;
    document.getElementById('result-area').classList.add('show');
    showStatus('success', '✅ 이미지 생성 성공! HiveRoom 연동이 가능해요.');

    applyCanvas(src);

  } catch(e){
    clearTimeout(timer);
    const msg = e.name === 'AbortError' ? '⏱️ 요청 시간 초과 (2분). 다시 시도해주세요.' : `❌ 오류: ${e.message || e}`;
    showStatus('error', msg);
  } finally {
    clearTimeout(timer);
    btn.disabled = false;
  }
}

function applyCanvas(src) {
  const img = new Image();
  img.onload = function() {
    const canvas = document.getElementById('result-canvas');
    const ctx = canvas.getContext('2d');
    const size = 640;
    canvas.width = size;
    canvas.height = size;
    ctx.clearRect(0, 0, size, size);

    if (document.getElementById('hex-mask').checked) {
      // White background outside hexagon
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      // Clip to pointy-top regular hexagon: center (320,320), r=300
      ctx.save();
      ctx.beginPath();
      const cx = 320, cy = 320, r = 300;
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2; // start at top
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, 0, 0, size, size);
      ctx.restore();
    } else {
      ctx.drawImage(img, 0, 0, size, size);
    }
  };
  img.src = src;
}

function downloadImg(){
  if(!window._lastImgSrc) return;
  const canvas = document.getElementById('result-canvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `gemini_room_${Date.now()}.png`;
  a.click();
}
</script>
</body>
</html>
