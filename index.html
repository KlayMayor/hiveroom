<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiveRoom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root {
  --honey:#F2B830; --hdk:#A87800; --hlt:#FFF8E8;
  --border:#E8E0D0; --bg:#F5F0E8;
  --text:#2A1F0E; --muted:#8A7A68;
  --ai-bg:#EEF6FF; --ai-br:#C8E0F8;
  --user-bg:#FFF4D6; --user-br:#F0D080;
  --accent:#E07820; --green:#4A8A50;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;color:var(--text);}

/* ── HEADER ── */
header{
  height:50px;background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  box-shadow:0 1px 6px rgba(0,0,0,.06);flex-shrink:0;z-index:200;position:relative;
}
.logo{font-family:'Jua',sans-serif;font-size:20px;color:var(--hdk);}
.h-sep{width:1px;height:20px;background:var(--border);}
.h-badge{font-size:11px;font-weight:700;background:var(--hlt);border:1px solid var(--honey);color:var(--hdk);padding:3px 12px;border-radius:14px;}
.h-make-btn{
  margin-left:auto;padding:8px 18px;
  background:linear-gradient(135deg,var(--honey),var(--accent));
  color:#fff;border:none;border-radius:20px;font-size:12.5px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 3px 12px rgba(224,120,32,.3);transition:all .2s;
}
.h-make-btn:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(224,120,32,.4);}
.h-make-btn.active{background:linear-gradient(135deg,#888,#555);}

/* ── MAP (항상 배경 전체화면) ── */
.map-wrap{flex:1;position:relative;background:#ECEEF2;overflow:hidden;}
#map-cv{position:absolute;top:0;left:0;cursor:grab;}
#map-cv.drag{cursor:grabbing;}
.map-zoom{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:10;}
.mz{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.1);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.12);}
.mz:hover{background:#fff;}
.map-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.4);color:#fff;padding:5px 14px;border-radius:18px;font-size:11px;pointer-events:none;white-space:nowrap;z-index:10;}
#toast{position:absolute;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--green);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;z-index:150;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ════════════════════════════════════
   방 만들기 콘솔 — 맵 위 플로팅 패널
   오른쪽에서 슬라이드인
════════════════════════════════════ */
#console{
  position:absolute;
  top:14px;right:14px;bottom:14px;
  width:920px;max-width:calc(100% - 28px);
  background:rgba(255,255,255,.97);
  border-radius:18px;
  box-shadow:0 12px 60px rgba(0,0,0,.22),0 2px 10px rgba(0,0,0,.07);
  border:1px solid rgba(255,255,255,.8);
  backdrop-filter:blur(16px);
  display:flex;flex-direction:column;overflow:hidden;
  z-index:100;
  /* 기본: 우측 밖으로 숨김 */
  transform:translateX(calc(100% + 30px));
  opacity:0;
  transition:transform .38s cubic-bezier(.22,1,.36,1), opacity .28s ease;
  pointer-events:none;
}
#console.open{transform:translateX(0);opacity:1;pointer-events:auto;}

/* 콘솔 헤더바 */
.con-head{
  height:48px;flex-shrink:0;
  background:linear-gradient(135deg,var(--honey),var(--accent));
  display:flex;align-items:center;padding:0 14px;gap:10px;
}
.con-title{font-family:'Jua',sans-serif;font-size:16px;color:#fff;display:flex;align-items:center;gap:8px;}
.con-live{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:10px;padding:2px 8px;font-size:9.5px;color:#fff;font-weight:700;}
.con-live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.con-right-acts{margin-left:auto;display:flex;align-items:center;gap:8px;}
.con-prog-bar{width:64px;height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden;}
.con-prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .5s ease;width:0%;}
.con-prog-txt{font-size:10px;color:rgba(255,255,255,.85);font-weight:700;min-width:22px;}
.con-finish-btn{padding:5px 14px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:14px;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;opacity:.4;pointer-events:none;transition:all .15s;}
.con-finish-btn.on{opacity:1;pointer-events:auto;}
.con-finish-btn.on:hover{background:rgba(255,255,255,.3);}
.con-close-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.con-close-btn:hover{background:rgba(255,255,255,.35);}

/* 콘솔 바디 */
.con-body{flex:1;display:flex;overflow:hidden;}

/* ── 왼쪽: 미리보기 ── */
.con-left{
  width:460px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:#F8F5F0;
  border-right:1px solid var(--border);
}
.preview-area{
  flex:3;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;padding:12px;width:100%;
  min-height:0;
}
.preview-ad{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:#EEEAE2;border-top:1px solid var(--border);
  font-size:11px;color:#BBB;letter-spacing:.3px;
  flex-shrink:0;
}
.preview-label{
  font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:.5px;text-transform:uppercase;
}
.preview-hint{
  font-size:10px;color:#BBB;text-align:center;line-height:1.6;
}
#room-cv{cursor:default;border-radius:4px;}

/* ── 오른쪽: 에셋 선택 ── */
.con-right{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;min-width:0;}

/* 에셋 탭 */
.asset-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0;}
.atab{flex:1;padding:9px 4px;font-size:11px;font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.atab.on{color:var(--hdk);border-bottom-color:var(--honey);background:var(--hlt);}
.atab:hover:not(.on){color:var(--text);background:#FAFAFA;}

.asset-pane{flex:1;overflow-y:auto;display:none;flex-direction:column;}
.asset-pane.on{display:flex;}
.asset-pane::-webkit-scrollbar{width:3px;}
.asset-pane::-webkit-scrollbar-thumb{background:var(--border);}
.agrid{display:flex;flex-wrap:wrap;gap:8px;padding:12px;}
.aitem{width:100px;cursor:pointer;border-radius:10px;border:2px solid transparent;overflow:hidden;background:#fff;transition:all .13s;}
.aitem:hover{border-color:var(--honey);transform:scale(1.05);}
.aitem.sel{border-color:var(--hdk);box-shadow:0 0 0 2px rgba(242,184,48,.25);}
.athumb{width:100px;height:75px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.aname{font-size:9px;text-align:center;padding:2px 3px 4px;line-height:1.3;}
.pane-sel-lbl{padding:4px 10px 8px;font-size:10px;color:var(--green);font-weight:600;flex-shrink:0;}
.pane-sel-lbl.none{color:#CCC;}

/* 반전 버튼 제거됨 - 캔버스 오버레이로 대체 */

/* ── 아이템 선택 컨트롤 오버레이 ── */
#item-ctrl{
  display:none;
  position:absolute;
  background:rgba(255,255,255,.96);
  border:2px solid var(--honey);
  border-radius:14px;
  padding:6px 10px;
  box-shadow:0 4px 20px rgba(0,0,0,.18);
  gap:8px;
  align-items:center;
  z-index:50;
  pointer-events:auto;
  white-space:nowrap;
}
#item-ctrl.show{display:flex;}
.ctrl-btn{
  width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
}
.ctrl-btn:hover{background:var(--hlt);border-color:var(--honey);}
.ctrl-btn.on{background:var(--honey);border-color:var(--hdk);color:#fff;}
.ctrl-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.ctrl-size{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-weight:700;}
.ctrl-size input[type=range]{
  width:70px;height:4px;accent-color:var(--honey);cursor:pointer;
}

/* ── 완성 오버레이 ── */
#done-ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);align-items:center;justify-content:center;}
#done-ov.show{display:flex;}
.done-box{background:#fff;border-radius:20px;padding:28px;text-align:center;width:min(380px,92vw);box-shadow:0 32px 80px rgba(0,0,0,.2);animation:popin .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popin{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.done-title{font-family:'Jua',sans-serif;font-size:20px;margin:14px 0 6px;}
.done-desc{font-size:11.5px;color:var(--muted);line-height:1.7;margin-bottom:10px;}
.png-prog{display:none;margin:10px 0;padding:10px 14px;background:#F0F8FF;border:1px solid #C0D8F0;border-radius:10px;font-size:11px;color:#3A6FA0;}
.png-prog.show{display:block;}
.png-bar-track{height:4px;background:#C0D8F0;border-radius:2px;margin-top:6px;overflow:hidden;}
.png-bar{height:100%;background:var(--honey);border-radius:2px;transition:width .4s ease;width:0%;}
.png-result{display:none;margin:10px 0;padding:10px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border);align-items:center;gap:10px;}
.png-result.show{display:flex;}
.png-thumb{width:76px;height:76px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
.png-meta{text-align:left;}
.png-fname{font-size:11px;font-weight:700;}
.png-fsize{font-size:10px;color:var(--muted);margin-top:2px;}
.png-dl{font-size:10px;color:var(--hdk);text-decoration:underline;cursor:pointer;margin-top:4px;display:inline-block;}
.done-btns{display:flex;gap:9px;justify-content:center;margin-top:16px;}
.done-main-btn{padding:11px 24px;border-radius:20px;background:linear-gradient(135deg,var(--honey),var(--accent));color:#fff;border:none;font-size:12.5px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.tw-input-wrap{margin:10px 0;text-align:left;}
.tw-input-wrap label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;}
.tw-input{width:100%;padding:9px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;box-sizing:border-box;}
.tw-input:focus{border-color:var(--honey);}
.tw-input.err{border-color:#E05050;}
.interest-wrap{margin:10px 0;text-align:left;}
.interest-wrap label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px;}
.interest-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.int-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px;border-radius:10px;border:2px solid transparent;transition:border-color .15s,transform .15s;}
.int-item:hover{transform:scale(1.1);}
.int-item.sel{border-color:var(--honey);background:rgba(242,184,48,.1);}
.int-item img{width:40px;height:40px;border-radius:50%;}
.int-item span{font-size:9px;color:#888;font-weight:600;white-space:nowrap;}
.int-item.sel span{color:var(--honey);}

/* ── 구글 로그인 버튼 ── */
.h-login-btn{
  margin-left:auto;padding:7px 16px;
  background:#fff;border:1.5px solid var(--border);
  color:var(--text);border-radius:20px;font-size:12px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;
}
.h-login-btn:hover{border-color:var(--honey);box-shadow:0 3px 12px rgba(0,0,0,.13);}
.h-login-btn img{width:18px;height:18px;border-radius:50%;}

/* ── 프로필 버튼 + 드롭다운 ── */
.h-profile-wrap{margin-left:auto;position:relative;}
.h-profile-btn{
  width:36px;height:36px;border-radius:50%;border:2.5px solid var(--honey);
  overflow:hidden;cursor:pointer;background:#eee;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all .2s;
}
.h-profile-btn:hover{transform:scale(1.08);}
.h-profile-btn img{width:100%;height:100%;object-fit:cover;}
.h-dropdown{
  position:absolute;top:44px;right:0;
  background:#fff;border:1px solid var(--border);
  border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);
  min-width:180px;overflow:hidden;z-index:300;
  display:none;flex-direction:column;
}
.h-dropdown.open{display:flex;}
.h-dd-header{padding:12px 16px;background:var(--hlt);border-bottom:1px solid var(--border);}
.h-dd-name{font-size:12px;font-weight:700;color:var(--hdk);}
.h-dd-email{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:148px;}
.h-dd-btn{
  padding:11px 16px;font-size:12px;font-weight:600;
  border:none;background:#fff;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;color:var(--text);
  display:flex;align-items:center;gap:8px;
  transition:background .12s;text-align:left;
}
.h-dd-btn:hover{background:var(--hlt);}
.h-dd-sep{height:1px;background:var(--border);}
.h-dd-btn.logout{color:#C44;}
.h-dd-btn.logout:hover{background:#FFF0F0;}

/* ── 방 선택 모달 ── */
#room-select-ov{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);align-items:center;justify-content:center;}
#room-select-ov.show{display:flex;}
.rs-box{background:#fff;border-radius:20px;padding:24px;width:min(480px,92vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.2);animation:popin .35s cubic-bezier(.34,1.56,.64,1);}
.rs-title{font-family:'Jua',sans-serif;font-size:18px;color:var(--hdk);margin-bottom:4px;}
.rs-sub{font-size:11px;color:var(--muted);margin-bottom:16px;}
.rs-grid{display:flex;flex-wrap:wrap;gap:12px;overflow-y:auto;flex:1;}
.rs-item{width:120px;cursor:pointer;border-radius:12px;border:2px solid var(--border);overflow:hidden;background:#F8F5F0;transition:all .15s;flex-shrink:0;}
.rs-item:hover{border-color:var(--honey);transform:scale(1.04);box-shadow:0 4px 16px rgba(242,184,48,.3);}
.rs-item img{width:120px;height:120px;object-fit:cover;display:block;}
.rs-item-num{font-size:11px;font-weight:700;text-align:center;padding:5px;color:var(--hdk);}
.rs-empty{font-size:13px;color:var(--muted);text-align:center;padding:30px;width:100%;}
.rs-close{margin-top:16px;padding:10px;border:none;background:var(--border);border-radius:12px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:var(--text);}
.rs-close:hover{background:#DDD;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🍯 HiveRoom</div>
  <div class="h-sep"></div>
  <div class="h-badge">Resident <span id="cnt">0</span></div>
  <!-- 비로그인 -->
  <button class="h-login-btn" id="login-btn" onclick="signInGoogle()">
    <img src="https://www.google.com/favicon.ico" alt="G"> LOG IN
  </button>
  <!-- 로그인 후 -->
  <div class="h-profile-wrap" id="profile-wrap" style="display:none;">
    <div class="h-profile-btn" id="profile-btn" onclick="toggleMenu()">
      <img id="profile-img" src="" alt="">
    </div>
    <div class="h-dropdown" id="h-dropdown">
      <div class="h-dd-header">
        <div class="h-dd-name" id="dd-name"></div>
        <div class="h-dd-email" id="dd-email"></div>
      </div>
      <button class="h-dd-btn" onclick="openMakeRoom()">🏠 방 만들기</button>
      <button class="h-dd-btn" onclick="openEditRoom()">✏️ 방 수정하기</button>
      <div class="h-dd-sep"></div>
      <button class="h-dd-btn logout" onclick="signOut()">🚪 로그아웃</button>
    </div>
  </div>
</header>

<!-- MAP: 항상 배경 전체 -->
<div class="map-wrap" id="map-wrap">
  <canvas id="map-cv"></canvas>

  <div class="map-zoom">
    <button class="mz" onclick="zoomIn()">+</button>
    <button class="mz" onclick="zoomOut()">−</button>
    <button class="mz" style="font-size:12px" onclick="resetView()">⌂</button>
  </div>
  <div class="map-hint">🖱 휠: 줌 &nbsp;·&nbsp; 드래그: 이동</div>
  <div id="toast">✅ 방이 맵에 등록됐어요!</div>

  <!-- ════ 방 만들기 콘솔 (맵 위 플로팅) ════ -->
  <div id="console">

    <!-- 헤더바 -->
    <div class="con-head">
      <div class="con-title">
        🏠 방 만들기
      </div>
      <div class="con-right-acts">
        <div class="con-prog-bar"><div class="con-prog-fill" id="cpf"></div></div>
        <span class="con-prog-txt" id="cpt">0/4</span>
        <button class="con-finish-btn" id="finish-btn" onclick="showDone()">완성하기 ✦</button>
        <button class="con-close-btn" onclick="closeConsole()">✕</button>
      </div>
    </div>

    <!-- 바디 -->
    <div class="con-body">

      <!-- 왼쪽: 미리보기 -->
      <div class="con-left">
        <div class="preview-area">
          <div style="position:relative;display:inline-block;">
            <canvas id="room-cv" width="700" height="700" style="width:400px;height:400px;display:block;"></canvas>
            <div id="item-ctrl">
              <div class="ctrl-size">
                <span>크기</span>
                <input type="range" id="ctrl-size-range" min="30" max="200" value="100"
                  oninput="onSizeChange(this.value)">
                <span id="ctrl-size-val">100%</span>
              </div>
              <div class="ctrl-sep"></div>
              <button class="ctrl-btn" id="ctrl-flip-btn" title="좌우반전" onclick="onCtrlFlip()">⇄</button>
              <button class="ctrl-btn" id="ctrl-layer-up" title="앞으로" onclick="onCtrlLayerUp()">↑</button>
              <button class="ctrl-btn" id="ctrl-layer-dn" title="뒤로" onclick="onCtrlLayerDn()">↓</button>
              <button class="ctrl-btn ctrl-del" title="선택해제" onclick="onCtrlDeselect()" style="color:#C44;">✕</button>
            </div>
          </div>
        </div>
        <div class="preview-ad">광고 영역</div>
      </div>

      <!-- 오른쪽: 에셋 선택 -->
      <div class="con-right">

        <!-- 에셋 탭 -->
        <div class="asset-tabs">
          <button class="atab on"  onclick="switchTab(this,'wall')">🖼 벽지</button>
          <button class="atab"     onclick="switchTab(this,'floor')">🪵 바닥</button>
          <button class="atab"     onclick="switchTab(this,'furniture')">🛋 가구</button>
          <button class="atab"     onclick="switchTab(this,'walldeco')">✨ 장식</button>
        </div>

async function initAuth(){
  // 세션 확인 (localStorage에 저장된 토큰)
  const saved = localStorage.getItem('hr_session');
  if(saved){
    try{
      const session = JSON.parse(saved);
      // 토큰 만료 확인
      if(session.expires_at && Date.now()/1000 < session.expires_at){
        await fetchUserFromToken(session.access_token);
        return;
      }
      // 리프레시 시도
      if(session.refresh_token){
        const ok = await refreshSession(session.refresh_token);
        if(ok) return;
      }
    }catch(e){}
    localStorage.removeItem('hr_session');
  }
  // URL에 code 파라미터가 있으면 OAuth 콜백
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if(code){
    await exchangeCode(code);
    // URL 정리
    history.replaceState({}, '', location.pathname);
  }
}

async function exchangeCode(code){
  const verifier = localStorage.getItem('hr_pkce_verifier');
  if(!verifier) return;
  const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=pkce`, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
    body: JSON.stringify({ auth_code: code, code_verifier: verifier })
  });
  const data = await res.json();
  if(data.access_token){
    localStorage.setItem('hr_session', JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: data.expires_at
    }));
    localStorage.removeItem('hr_pkce_verifier');
    await fetchUserFromToken(data.access_token);
  }
}

async function refreshSession(refresh_token){
  const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, {
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
    body: JSON.stringify({ refresh_token })
  });
  const data = await res.json();
  if(data.access_token){
    localStorage.setItem('hr_session', JSON.stringify({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: data.expires_at
    }));
    await fetchUserFromToken(data.access_token);
    return true;
  }
  return false;
}

async function fetchUserFromToken(token){
  const res = await fetch(`${SUPA_URL}/auth/v1/user`, {
    headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${token}`}
  });
  const data = await res.json();
  if(data.id){
    CURRENT_USER = {
      id: data.id,
      email: data.email,
      name: data.user_metadata?.full_name || data.email,
      avatar: data.user_metadata?.avatar_url || '',
      token
    };
    setLoggedIn(CURRENT_USER);
  }
}

async function signInGoogle(){
  // PKCE code_verifier 생성
  const verifier = generateVerifier();
  localStorage.setItem('hr_pkce_verifier', verifier);
  const challenge = await generateChallenge(verifier);
  const redirectUrl = encodeURIComponent(location.origin + location.pathname);
  const url = `${SUPA_URL}/auth/v1/authorize?provider=google&redirect_to=${redirectUrl}&code_challenge=${challenge}&code_challenge_method=S256`;
  location.href = url;
}

async function signOut(){
  const saved = localStorage.getItem('hr_session');
  if(saved){
    const { access_token } = JSON.parse(saved);
    await fetch(`${SUPA_URL}/auth/v1/logout`, {
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${access_token}`}
    }).catch(()=>{});
  }
  localStorage.removeItem('hr_session');
  CURRENT_USER = null;
  setLoggedOut();
  closeMenu();
}

function generateVerifier(){
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateChallenge(verifier){
  const data = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ASSET DB (Supabase Storage REST API)
// ══════════════════════════════════════
const ASSETS = { wall:[], floor:[], furniture:[], walldeco:[] };

function fileToName(filename){
  return filename.replace(/\.(jpg|jpeg|png)$/i,'').replace(/[-_]/g,' ');
}

async function supaList(folder){
  const res = await fetch(
    `${SUPA_URL}/storage/v1/object/list/asset`,
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPA_KEY}`,
        'apikey': SUPA_KEY,
      },
      body: JSON.stringify({
        prefix: folder,
        limit: 200,
        offset: 0,
        sortBy: { column: 'name', order: 'asc' },
      }),
    }
  );
  if(!res.ok) throw new Error(await res.text());
  return await res.json();
}

function supaPublicUrl(path){
  return `${SUPA_URL}/storage/v1/object/public/asset/${path}`;
}

async function loadAssets(){
  const folders = [
    {cat:'wall',      folder:'wall'},
    {cat:'floor',     folder:'floor'},
    {cat:'furniture', folder:'furniture'},
    {cat:'walldeco',  folder:'deco'},
  ];

  await Promise.all(folders.map(async ({cat, folder})=>{
    try {
      const data = await supaList(folder);
      ASSETS[cat] = data
        .filter(f => f.name && /\.(jpg|jpeg|png)$/i.test(f.name))
        .map(f => ({
          id:   folder[0] + f.name.replace(/\.(jpg|jpeg|png)$/i,'').replace(/[-_]/g,''),
          name: fileToName(f.name),
          url:  supaPublicUrl(`${folder}/${f.name}`),
          cat,
        }));
    } catch(e){
      console.warn(`${folder} 로드 실패:`, e.message);
    }
  }));

  buildGrids();
  renderRoom();
}

function showCtrl(cat, id){
  CTRL_SEL = {cat, id};
  const flipped = !!FLIP[cat]?.[id];
  const sizeVal = Math.round((SIZE[cat]?.[id] || 1.0) * 100);
  document.getElementById('ctrl-size-range').value = sizeVal;
  document.getElementById('ctrl-size-val').textContent = sizeVal + '%';
  document.getElementById('ctrl-flip-btn').classList.toggle('on', flipped);

  document.getElementById('item-ctrl').classList.add('show');
}
function hideCtrl(){
  CTRL_SEL = {cat:null, id:null};
  document.getElementById('item-ctrl').classList.remove('show');
  renderRoom();
}
function positionCtrl(cat, id){
  const pos = (cat==='furniture' ? POS.furniture[id] : POS.walldeco[id]);
  if(!pos) return;
  const scale = 400/700;
  const sx = pos.x * scale;
  const sy = pos.y * scale;
  const ctrl = document.getElementById('item-ctrl');
  let top = sy + 50;
  if(top > 370) top = sy - 70;
  let left = sx - 100;
  if(left < 0) left = 4;
  if(left > 280) left = 280;
  ctrl.style.left = left + 'px';
  ctrl.style.top  = top  + 'px';
}
function onSizeChange(val){
  const {cat, id} = CTRL_SEL;
  if(!cat||!id) return;
  if(!SIZE[cat]) SIZE[cat]={};
  SIZE[cat][id] = val / 100;
  document.getElementById('ctrl-size-val').textContent = val + '%';
  renderRoom();
}
function onCtrlFlip(){
  const {cat, id} = CTRL_SEL;
  if(!cat||!id) return;
  FLIP[cat][id] = !FLIP[cat][id];
  document.getElementById('ctrl-flip-btn').classList.toggle('on', !!FLIP[cat][id]);
  renderRoom();
}
function onCtrlDeselect(){
  CTRL_SEL = {cat:null, id:null};
  document.getElementById('item-ctrl').classList.remove('show');
  renderRoom();
}

function pick(cat,id,multi){
  if(multi){
    if(SEL[cat].has(id)){
      SEL[cat].delete(id);
      delete FLIP[cat]?.[id];
      delete POS[cat]?.[id];
      delete SIZE[cat]?.[id];
      LAYER_ORDER[cat] = LAYER_ORDER[cat].filter(x=>x!==id);
      if(CTRL_SEL.cat===cat && CTRL_SEL.id===id) hideCtrl();
    } else {
      SEL[cat].add(id);
      LAYER_ORDER[cat].push(id);
      setTimeout(()=>showCtrl(cat,id), 50);
    }
  } else {
    SEL[cat]=id;
  }
  refreshGrid(cat,multi); refreshLabel(cat); renderRoom(); updateProg();
}
function onCtrlLayerUp(){
  const {cat,id}=CTRL_SEL; if(!cat||!id||!LAYER_ORDER[cat]) return;
  const arr=LAYER_ORDER[cat], i=arr.indexOf(id);
  if(i<arr.length-1){arr.splice(i,1);arr.splice(i+1,0,id);}

// 방 렌더링 (정육각형 3면)
// ══════════════════════════════════════
const RCV=document.getElementById('room-cv');
const rctx=RCV.getContext('2d');
const RCX=350,RCY=350,RS=322;

function rv(cx,cy,s){const v=[];for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);v.push({x:cx+s*Math.cos(a),y:cy+s*Math.sin(a)});}return v;}
function rClip(cx,cy,s){const v=rv(cx,cy,s);rctx.beginPath();v.forEach((p,i)=>i?rctx.lineTo(p.x,p.y):rctx.moveTo(p.x,p.y));rctx.closePath();}
function rPoly(pts){rctx.beginPath();pts.forEach((p,i)=>i?rctx.lineTo(p.x,p.y):rctx.moveTo(p.x,p.y));rctx.closePath();}
function ctr(...ps){return{x:ps.reduce((s,p)=>s+p.x,0)/ps.length,y:ps.reduce((s,p)=>s+p.y,0)/ps.length};}
// ── 이미지 캐시 ──
const IMG_CACHE = {};
function loadImg(url){
  if(IMG_CACHE[url]) return Promise.resolve(IMG_CACHE[url]);
  return new Promise(res=>{
    const img=new Image(); img.crossOrigin='anonymous'; img.src=url;
    img.onload=()=>{ IMG_CACHE[url]=img; res(img); };
    img.onerror=()=>res(null);
  });
}

async function renderRoom(){
  const W=700, H=700;
  rctx.clearRect(0,0,W,H);
  const v=rv(RCX,RCY,RS);
  const C={x:RCX,y:RCY};
  const vT=v[5],vBL=v[3],vBR=v[1],vTL=v[4],vTR=v[0],vB=v[2];
  const wa=SEL.wall  ? ASSETS.wall.find(a=>a.id===SEL.wall)   : null;
  const fl=SEL.floor ? ASSETS.floor.find(a=>a.id===SEL.floor) : null;
  const bc=ctr(C,vBL,vB,vBR);
  const lc=ctr(C,vT,vTL,vBL);
  const rc=ctr(C,vT,vTR,vBR);
  const [waImg,flImg]=await Promise.all([
    wa?loadImg(wa.url):Promise.resolve(null),
    fl?loadImg(fl.url):Promise.resolve(null),
  ]);
  function makeOff(){const c=document.createElement('canvas');c.width=W;c.height=H;return c;}

  // 레이어4: 바닥 (3×3 타일, 중앙 기준)
  const offFloor=makeOff(); const fctx=offFloor.getContext('2d');
  fctx.save(); poly(fctx,[C,vBL,vB,vBR]); fctx.fillStyle='#D8C8A8'; fctx.fill(); fctx.clip();
  if(flImg){
    // 바닥 영역 bounding box
    const flPts=[C,vBL,vB,vBR];
    const fxMin=Math.min(...flPts.map(p=>p.x)), fxMax=Math.max(...flPts.map(p=>p.x));
    const fyMin=Math.min(...flPts.map(p=>p.y)), fyMax=Math.max(...flPts.map(p=>p.y));
    const fw=fxMax-fxMin, fh=fyMax-fyMin;
    const fcx=(fxMin+fxMax)/2, fcy=(fyMin+fyMax)/2;
    // 타일 1개 크기: 바닥 영역의 1/3 (25% 축소 효과)
    const tileW = fw * 0.39;
    const tileH = fh * 0.39;
    // 3×3 배치: 중앙 타일이 fcx,fcy 기준
    for(let row=-1; row<=1; row++){
      for(let col=-1; col<=1; col++){
        const tx = fcx + col * tileW - tileW/2;
        const ty = fcy + row * tileH - tileH/2;
        fctx.drawImage(flImg, tx, ty, tileW, tileH);
      }
    }
  }
  fctx.restore();
  rctx.drawImage(offFloor,0,0);

  // 레이어3: 벽지
  const offWall=makeOff(); const wctx=offWall.getContext('2d');
  wctx.save(); poly(wctx,[C,vT,vTL,vBL]); wctx.fillStyle='#EDE5D8'; wctx.fill(); wctx.clip();
  if(waImg){ drawImgTile(wctx,waImg,0,0,W,H); wctx.fillStyle='rgba(0,0,0,.08)'; wctx.fillRect(0,0,W,H); }
  wctx.restore();
  wctx.save(); poly(wctx,[C,vT,vTR,vBR]); wctx.fillStyle='#F0E8DC'; wctx.fill(); wctx.clip();
  if(waImg) drawImgTile(wctx,waImg,0,0,W,H);
  wctx.restore();
  rctx.drawImage(offWall,0,0);

  // 분할선 (벽/바닥 위, 가구/장식 아래) — 오프스크린에 그려서 합성
  const offDiv=makeOff(); const dvctx=offDiv.getContext('2d');
  dvctx.save();
  hexClip(dvctx,RCX,RCY,RS); dvctx.clip();
  dvctx.strokeStyle='rgba(100,80,60,.18)'; dvctx.lineWidth=2;
  const _C={x:RCX,y:RCY};
  [[_C,vT],[_C,vBL],[_C,vBR]].forEach(([a,b])=>{dvctx.beginPath();dvctx.moveTo(a.x,a.y);dvctx.lineTo(b.x,b.y);dvctx.stroke();});
  dvctx.restore();
  rctx.drawImage(offDiv,0,0);

  // 레이어2: 장식 (육각형 클립)
  const offDeco=makeOff(); const dctx=offDeco.getContext('2d');
  dctx.save(); hexClip(dctx,RCX,RCY,RS); dctx.clip();
  await drawDecoCtx(dctx);
  dctx.restore();
  rctx.drawImage(offDeco,0,0);

  // 레이어1: 가구 (육각형 클립)
  const offFurn=makeOff(); const ufctx=offFurn.getContext('2d');
  ufctx.save(); hexClip(ufctx,RCX,RCY,RS); ufctx.clip();
  await drawFurnCtx(ufctx);
  ufctx.restore();
  rctx.drawImage(offFurn,0,0);

  // 외곽 테두리는 JPEG에 포함되지 않도록 renderRoom에서 제거
  // (맵에서는 drawFilled가 황금선으로 별도 표시)


}

function drawImgTile(ctx,img,x,y,w,h,scaleOverride){
  if(!img)return;
  const pat=ctx.createPattern(img,'repeat');
  if(!pat)return;
  const scale = scaleOverride || Math.min(w/img.width, h/img.height, 0.5);
  const m=new DOMMatrix(); m.a=scale; m.d=scale;
  pat.setTransform(m);
  ctx.fillStyle=pat; ctx.fillRect(x,y,w,h);
}

function poly(ctx,pts){ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();}
function hexClip(ctx,cx,cy,s){ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);const x=cx+s*Math.cos(a),y=cy+s*Math.sin(a);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();}

function drawWindowCtx(ctx,c){
  const wx=c.x+10,wy=c.y-77,ww=147,wh=119;
  ctx.fillStyle='rgba(173,216,240,.5)';ctx.fillRect(wx,wy,ww,wh);
  ctx.strokeStyle='rgba(160,160,160,.65)';ctx.lineWidth=4;ctx.strokeRect(wx,wy,ww,wh);
  ctx.beginPath();ctx.moveTo(wx+ww/2,wy);ctx.lineTo(wx+ww/2,wy+wh);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wx,wy+wh/2);ctx.lineTo(wx+ww,wy+wh/2);ctx.stroke();
}

// 육각형 내부로 좌표 클램프 (반지름 초과 시 경계로 당김)
function clampToHex(px,py,margin){
  const s=RS-(margin||0);
  const dx=px-RCX, dy=py-RCY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<=s) return{x:px,y:py};
  return{x:RCX+dx/dist*s, y:RCY+dy/dist*s};
}

async function drawDecoCtx(ctx){
  const v=rv(RCX,RCY,RS);
  const C={x:RCX,y:RCY};
  const lc=ctr(C,v[5],v[4],v[3]);
  const rc=ctr(C,v[5],v[0],v[1]);
  const spreadPos=i=>{
    const bases=[
      {x:lc.x-60,y:lc.y-80},{x:rc.x+60,y:rc.y-80},
      {x:lc.x-60,y:lc.y+40},{x:rc.x+60,y:rc.y+40},
      {x:RCX,y:lc.y-80},{x:RCX,y:rc.y+40},
      {x:lc.x-60,y:RCY},{x:rc.x+60,y:RCY},
    ];
    return bases[i%bases.length]||{x:RCX+((i%4-1.5)*100),y:RCY+((Math.floor(i/4)-1)*80)};
  };
  // LAYER_ORDER 기준으로 그리기 (앞에 있는 것이 나중에 그려짐)
  const ids=LAYER_ORDER.walldeco.filter(id=>SEL.walldeco.has(id));
  for(let i=0;i<ids.length;i++){
    const d=ASSETS.walldeco.find(a=>a.id===ids[i]); if(!d) continue;
    if(!POS.walldeco[d.id]) POS.walldeco[d.id]={...spreadPos(i)};
    const pos=POS.walldeco[d.id];
    const flipped=!!FLIP.walldeco?.[d.id];
    const sizeMul=SIZE.walldeco?.[d.id]||1.0;
    const isCtrl=CTRL_SEL.cat==='walldeco'&&CTRL_SEL.id===d.id;
    const sz=Math.round(180*sizeMul);
    const img=await loadImg(d.url);
    ctx.save(); ctx.globalAlpha=1;
    if(isCtrl){
      ctx.beginPath();ctx.arc(pos.x,pos.y,sz/2+18,0,Math.PI*2);
      ctx.strokeStyle='rgba(242,184,48,.95)';ctx.lineWidth=5;
      ctx.setLineDash([10,5]);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.translate(pos.x,pos.y);
    if(flipped) ctx.scale(-1,1);
    if(img) ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
    ctx.restore();
  }
}

function furnBaseCenter(){
  const v=rv(RCX,RCY,RS);
  const C={x:RCX,y:RCY};
  return ctr(C,v[3],v[2],v[1]);
}

async function drawFurnCtx(ctx){
  const bc=furnBaseCenter();
  const spreadPos=i=>{
    const slots=[
      {dx:-110,dy:-60},{dx:110,dy:-60},{dx:-110,dy:80},{dx:110,dy:80},
      {dx:0,dy:-60},{dx:0,dy:80},{dx:-110,dy:10},{dx:110,dy:10},
      {dx:-55,dy:-120},{dx:55,dy:-120},{dx:-55,dy:120},{dx:55,dy:120},
    ];
    const s=slots[i%slots.length]||{dx:((i%4-1.5)*100),dy:(Math.floor(i/4)*80-40)};
    return{x:bc.x+s.dx, y:bc.y+s.dy};
  };
  // LAYER_ORDER 기준으로 그리기
  const ids=LAYER_ORDER.furniture.filter(id=>SEL.furniture.has(id));
  for(let i=0;i<ids.length;i++){
    const f=ASSETS.furniture.find(a=>a.id===ids[i]); if(!f) continue;
    if(!POS.furniture[f.id]) POS.furniture[f.id]={...spreadPos(i)};
    // 육각형 경계 클램프
    POS.furniture[f.id]=clampToHex(POS.furniture[f.id].x, POS.furniture[f.id].y, 70);
    const pos=POS.furniture[f.id];
    const flipped=!!FLIP.furniture?.[f.id];
    const sizeMul=SIZE.furniture?.[f.id]||1.0;
    const isCtrl=CTRL_SEL.cat==='furniture'&&CTRL_SEL.id===f.id;
    const sz=Math.round(220*sizeMul);
    const img=await loadImg(f.url);
    ctx.save(); ctx.globalAlpha=1;
    if(isCtrl){
      ctx.beginPath();ctx.arc(pos.x,pos.y,sz/2+18,0,Math.PI*2);
      ctx.strokeStyle='rgba(242,184,48,.95)';ctx.lineWidth=5;
      ctx.setLineDash([10,5]);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.translate(pos.x,pos.y);
    if(flipped) ctx.scale(-1,1);
    if(img) ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
    ctx.restore();
  }
}

// 드래그 시스템
// ══════════════════════════════════════
const dragState = {active:false, cat:null, id:null, offX:0, offY:0};

// 캔버스 좌표 변환 (화면 200px → 내부 700px)
function cvCoord(e){
  const rect=RCV.getBoundingClientRect();
  const scaleX=700/rect.width, scaleY=700/rect.height;
  return{
    x:(e.clientX-rect.left)*scaleX,
    y:(e.clientY-rect.top)*scaleY
  };
}

// 클릭 위치에 가장 가까운 아이템 찾기 (hitRadius 내)
function hitTest(cx,cy){
  const HIT=60;
  // 가구 먼저
  const fItems=[...SEL.furniture].map(id=>({cat:'furniture',id,pos:POS.furniture[id]})).filter(x=>x.pos);
  const dItems=[...SEL.walldeco].map(id=>({cat:'walldeco',id,pos:POS.walldeco[id]})).filter(x=>x.pos);
  for(const item of [...fItems,...dItems]){
    const dx=cx-item.pos.x, dy=cy-item.pos.y;
    if(Math.sqrt(dx*dx+dy*dy)<HIT) return item;
  }
  return null;
}

RCV.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  const{x,y}=cvCoord(e);
  const hit=hitTest(x,y);
  if(hit){
    // 컨트롤이 열린 아이템만 드래그 허용
    if(CTRL_SEL.cat===hit.cat && CTRL_SEL.id===hit.id){
      dragState.active=true;
      dragState.cat=hit.cat;
      dragState.id=hit.id;
      dragState.offX=x-hit.pos.x;
      dragState.offY=y-hit.pos.y;
      dragState.moved=false;
      RCV.style.cursor='grabbing';
    } else {
      // 다른 아이템 클릭 → 컨트롤 전환
      showCtrl(hit.cat, hit.id);
    }
    e.preventDefault();
  } else {
    // 빈 곳 클릭 → 컨트롤 숨김
    hideCtrl();
  }
});

RCV.addEventListener('mousemove',e=>{
  if(!dragState.active){
    const{x,y}=cvCoord(e);
    const h=hitTest(x,y);
    RCV.style.cursor=(h && CTRL_SEL.cat===h.cat && CTRL_SEL.id===h.id)?'grab':'default';
    return;
  }
  const{x,y}=cvCoord(e);
  POS[dragState.cat][dragState.id]={
    x: x-dragState.offX,
    y: y-dragState.offY
  };
  dragState.moved=true;
  // 드래그 중 컨트롤 위치 업데이트
  if(CTRL_SEL.cat===dragState.cat && CTRL_SEL.id===dragState.id){
    positionCtrl(dragState.cat, dragState.id);
  }
  renderRoom();
});

window.addEventListener('mouseup',()=>{
  if(dragState.active){
    const wasMoved=dragState.moved;
    const cat=dragState.cat, id=dragState.id;
    dragState.active=false; dragState.cat=null; dragState.id=null; dragState.moved=false;
    RCV.style.cursor='default';
    // 드래그 후 렌더만 (클릭은 mousedown에서 처리)
    renderRoom();
  }
});

// 터치 지원
RCV.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  const{x,y}=cvCoord(t);
  const hit=hitTest(x,y);
  if(hit){
    dragState.active=true;
    dragState.cat=hit.cat; dragState.id=hit.id;
    dragState.offX=x-hit.pos.x; dragState.offY=y-hit.pos.y;
    e.preventDefault();
  }
},{passive:false});

RCV.addEventListener('touchmove',e=>{
  if(!dragState.active) return;
  const{x,y}=cvCoord(e.touches[0]);
  POS[dragState.cat][dragState.id]={x:x-dragState.offX, y:y-dragState.offY};
  renderRoom();
  e.preventDefault();
},{passive:false});

RCV.addEventListener('touchend',()=>{
  dragState.active=false; dragState.cat=null; dragState.id=null;
});

async function registerRoom(){
  const twEl = document.getElementById('tw-id');
  const twitterId = twEl.value.replace('@','').trim();
  if(!twitterId){ twEl.classList.add('err'); twEl.focus(); return; }
  twEl.classList.remove('err');

  const isEdit = !!EDIT_ROOM_NUM;
  const rb=document.getElementById('reg-btn'); rb.disabled=true; rb.textContent='⏳ 처리 중...';
  const pg=document.getElementById('png-prog'), bar=document.getElementById('png-bar'), st=document.getElementById('png-status');
  pg.classList.add('show'); st.textContent='📦 JPEG 생성 중...'; bar.style.width='0%';
  await sleep(100);

  // 1. JPEG 생성 — 선택 테두리 숨기고 렌더 후 크롭
  const _prevCtrl = {...CTRL_SEL};
  CTRL_SEL = {cat:null, id:null}; // 주황 테두리 제거
  await renderRoom();              // 테두리 없이 재렌더
  const cropSize = RS * 2;
  const cropX = RCX - cropSize / 2;
  const cropY = RCY - cropSize / 2;
  const off=document.createElement('canvas'); off.width=cropSize; off.height=cropSize;
  const octx=off.getContext('2d');
  octx.fillStyle='#fff'; octx.fillRect(0,0,cropSize,cropSize);
  octx.drawImage(RCV, cropX, cropY, cropSize, cropSize, 0, 0, cropSize, cropSize);
  pngUrl = off.toDataURL('image/jpeg', 0.92);
  CTRL_SEL = _prevCtrl; // 원복
  bar.style.width='20%'; await sleep(100);

  // 2. room_number 결정 (신규: 최대+1 / 수정: 기존 번호)
  st.textContent='🗃 방 번호 확인 중...'; bar.style.width='35%';
  let targetNum;
  if(isEdit){
    targetNum = EDIT_ROOM_NUM;
  } else {
    // 동시접속 충돌 방지: 빈 슬롯 중 가장 작은 번호 선택
    // rooms 테이블에서 사용 중인 번호 목록 조회
    const dbRes = await fetch(
      `${SUPA_URL}/rest/v1/rooms?select=room_number&order=room_number.asc`,
      { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
    );
    const dbData = await dbRes.json();
    const used = new Set((dbData||[]).map(r=>r.room_number));
    // 1~50 중 비어있는 첫 번째 슬롯
    targetNum = 1;
    for(let i=1; i<=50; i++){ if(!used.has(i)){ targetNum=i; break; } }
  }

  // 3. Storage 업로드 (신규: POST / 수정: PUT)
  st.textContent='☁️ 이미지 업로드 중...'; bar.style.width='55%';
  const blob = await (await fetch(pngUrl)).blob();
  // 수정 시 PUT, 신규 시 POST (x-upsert로 덮어쓰기)
  const upRes = await fetch(
    `${SUPA_URL}/storage/v1/object/room-pic/${targetNum}/room.jpg`,
    {
      method: isEdit ? 'PUT' : 'POST',
      headers: {
        'Authorization': `Bearer ${CURRENT_USER?.token || SUPA_KEY}`,
        'apikey': SUPA_KEY,
        'Content-Type': 'image/jpeg',
        'x-upsert': 'true',
      },
      body: blob,

// ══════════════════════════════════════
// MAP 렌더링
// ══════════════════════════════════════
const SLOT_POS=[null,
  {q:0,r:0},{q:0,r:-1},{q:-1,r:0},{q:-1,r:1},{q:0,r:1},{q:1,r:0},{q:1,r:-1},
  {q:1,r:-2},{q:0,r:-2},{q:-1,r:-1},{q:-2,r:0},{q:-2,r:1},{q:-2,r:2},{q:-1,r:2},
  {q:0,r:2},{q:1,r:1},{q:2,r:0},{q:2,r:-1},{q:2,r:-2},{q:2,r:-3},
  {q:1,r:-3},{q:0,r:-3},{q:-1,r:-2},{q:-2,r:-1},{q:-3,r:0},{q:-3,r:1},{q:-3,r:2},
  {q:-3,r:3},{q:-2,r:3},{q:-1,r:3},{q:0,r:3},{q:1,r:2},{q:2,r:1},{q:3,r:0},
  {q:3,r:-1},{q:3,r:-2},{q:3,r:-3},{q:3,r:-4},{q:2,r:-4},{q:1,r:-4},{q:0,r:-4},
  {q:-1,r:-3},{q:-2,r:-2},{q:-3,r:-1},{q:-4,r:0},{q:-4,r:1},{q:-4,r:2},{q:-4,r:3},
  {q:-4,r:4},{q:-3,r:4},
];
const ROOMS = {}; // Supabase에서 로드됨

const mCV=document.getElementById('map-cv');
const mctx=mCV.getContext('2d');
let mW=0,mH=0,HEX=58,mScale=1,mOX=0,mOY=0;
let isDrag=false,dSt={x:0,y:0},dOff={x:0,y:0};

// ── 우주 배경 별 데이터 (1회 생성) ──
const STARS = Array.from({length: 280}, () => ({
  x: Math.random(),  // 0~1 비율 (resizeMap 시 재계산)
  y: Math.random(),
  r: Math.random() * 2.4 + 0.3,
  a: Math.random() * 0.7 + 0.3,
  twinkle: Math.random() * Math.PI * 2  // 초기 위상
}));
// 성운 블롭 (배경 장식)
const NEBULAS = Array.from({length: 5}, () => ({
  x: Math.random(), y: Math.random(),
  rx: Math.random() * 0.18 + 0.08,
  ry: Math.random() * 0.12 + 0.06,
  hue: [240,260,200,280,220][Math.floor(Math.random()*5)],
  a: Math.random() * 0.07 + 0.03
}));
let starTick = 0;
let MAP_HOVER={num:null,bx:0,by:0,bR:0}; // 호버 중인 방 뱃지
let BADGE_SCALE={}; // 각 방 뱃지 현재 스케일 (1.0 ~ 2.0)
let BADGE_RAF=null; // requestAnimationFrame ID

function resizeMap(){
  const w=document.getElementById('map-wrap');
  mW=w.offsetWidth;mH=w.offsetHeight;mCV.width=mW;mCV.height=mH;drawMap();
}
function ap(q,r){const s=HEX*mScale;return{x:s*Math.sqrt(3)*(q+r/2)+mOX+mW/2,y:s*1.5*r+mOY+mH/2};}
function mHex(cx,cy,s){mctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);const x=cx+s*Math.cos(a),y=cy+s*Math.sin(a);i?mctx.lineTo(x,y):mctx.moveTo(x,y);}mctx.closePath();}
function ltn(hex,a){const n=parseInt(hex.replace('#',''),16);const c=(v,d)=>Math.min(255,Math.max(0,(v>>0)+d));return`rgb(${c(n>>16,a)},${c((n>>8)&255,a)},${c(n&255,a)})`;}

// ── 아바타 이미지 캐시 ──
// 관심사 목록 (Supabase interests 테이블에서 동적 로드)
let INTERESTS = []; // [{key, label, icon_url, color}]
const INTEREST_IMG_CACHE = {};

async function loadInterests(){
  try {
    const res = await fetch(
      `${SUPA_URL}/rest/v1/interests?active=eq.true&order=sort_order.asc`,
      { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }
    );
    if(!res.ok) return;
    INTERESTS = await res.json();
    buildInterestGrid();
    // 아이콘 이미지 미리 캐시
    INTERESTS.forEach(i => preloadInterestImg(i.key, i.icon_url));
  } catch(e){ console.warn('관심사 로드 실패:', e); }
}

function preloadInterestImg(key, url){
  if(!url || INTEREST_IMG_CACHE[key]) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { INTEREST_IMG_CACHE[key] = img; drawMap(); };
  img.src = url;
}

function buildInterestGrid(){
  const grid = document.getElementById('interest-grid');
  if(!grid) return;
  grid.innerHTML = '';
  INTERESTS.forEach(item => {
    const div = document.createElement('div');
    div.className = 'int-item' + (SEL_INTEREST === item.key ? ' sel' : '');
    div.dataset.key = item.key;
    div.onclick = () => pickInterest(item.key);
    div.innerHTML = `<img src="${item.icon_url}" alt="${item.label}"><span>${item.label}</span>`;
    grid.appendChild(div);
  });
}

function getInterestImgForMap(key){
  if(!key) return null;
  if(INTEREST_IMG_CACHE[key]) return INTEREST_IMG_CACHE[key];
  // 아직 캐시 없으면 interests에서 url 찾아 로드
  const item = INTERESTS.find(i=>i.key===key);
  if(item) preloadInterestImg(key, item.icon_url);
  return null;
}

const AVATAR_CACHE = {};
function loadAvatarImg(url){
  if(!url || AVATAR_CACHE[url]) return AVATAR_CACHE[url] || null;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { AVATAR_CACHE[url] = img; drawMap(); };
  img.onerror = () => { AVATAR_CACHE[url] = null; };
  img.src = url;
  return null;
}

function drawCircleImg(ctx, img, cx, cy, r){
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(img, cx-r, cy-r, r*2, r*2);
  ctx.restore();
}

function drawMap(){
  mctx.clearRect(0,0,mW,mH);

  // ── 우주 배경 ──
  // 딥 스페이스 그라디언트
  const bg = mctx.createRadialGradient(mW*.4,mH*.35,0, mW*.5,mH*.5,Math.max(mW,mH)*.85);
  bg.addColorStop(0,'#1a1240');
  bg.addColorStop(0.4,'#0d0820');
  bg.addColorStop(1,'#050310');
  mctx.fillStyle=bg; mctx.fillRect(0,0,mW,mH);

  // 성운
  starTick += 0.012;
  NEBULAS.forEach(n=>{
    const gx=n.x*mW, gy=n.y*mH;
    const gr=mctx.createRadialGradient(gx,gy,0,gx,gy,n.rx*mW);
    gr.addColorStop(0,`hsla(${n.hue},70%,60%,${n.a})`);
    gr.addColorStop(1,'transparent');
    mctx.save();
    mctx.scale(1, n.ry/n.rx);
    mctx.fillStyle=gr;
    mctx.beginPath();
    mctx.arc(gx, gy*(n.rx/n.ry), n.rx*mW, 0, Math.PI*2);
    mctx.fill();
    mctx.restore();
  });

  // 별 (반짝임)
  STARS.forEach(st=>{
    const a = st.a * (0.15 + 0.85*Math.sin(starTick*1.5 + st.twinkle));
    mctx.beginPath();
    mctx.arc(st.x*mW, st.y*mH, st.r, 0, Math.PI*2);
    mctx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
    mctx.fill();
  });

  // ── 방 렌더 (채워진 방만) ──
  const s=HEX*mScale;
  const sorted=[...Array(51).keys()].slice(1).sort((a,b)=>{const pa=SLOT_POS[a],pb=SLOT_POS[b];return(pa.r-pb.r)||(pa.q-pb.q);});
  sorted.forEach(num=>{
    const pos=SLOT_POS[num];if(!pos)return;
    const{x:cx,y:cy}=ap(pos.q,pos.r);
    if(cx<-s*2||cx>mW+s*2||cy<-s*2||cy>mH+s*2)return;
    const room=ROOMS[num];
    if(room) drawFilled(cx,cy,s,num,room);
    else drawEmptyGrid(cx,cy,s); // 빈 방: 연한 그리드만
  });
}

function drawFilled(cx,cy,s,num,room){
  mctx.save(); mHex(cx,cy,s-1);
  mctx.fillStyle='#fff'; mctx.fill(); mctx.clip();
  if(room.img){
    // 저장된 이미지는 644×644 정사각형 (육각형 세로 기준 크롭)
    // 육각형 세로 = 2s 에 맞게 그대로 매핑
    const drawH = s * 2;
    const drawW = s * 2;
    mctx.drawImage(room.img, cx - drawW/2, cy - drawH/2, drawW, drawH);
  }
  mctx.restore();
  // 외곽선
  mHex(cx,cy,s-.5); mctx.strokeStyle='#E8C84A'; mctx.lineWidth=2; mctx.stroke();
  // 프로필 사진 원형 뱃지 (왼쪽 위) — 스케일 애니메이션 적용
  const bRBase=Math.max(10,s*.16), bx=cx-s*.58, by=cy-s*.56;
  const sc = BADGE_SCALE[num] || 1.0;
  const bR = bRBase * sc;
  const avatarImg = room.avatarUrl ? AVATAR_CACHE[room.avatarUrl] : null;
  if(!avatarImg && room.avatarUrl){
    loadAvatarImg(room.avatarUrl);
  }
  // 흰 테두리 원 (스케일 적용)
  mctx.beginPath(); mctx.arc(bx,by,bR+2*sc,0,Math.PI*2);
  mctx.fillStyle='rgba(255,255,255,.95)'; mctx.fill();
  if(avatarImg){
    drawCircleImg(mctx, avatarImg, bx, by, bR);
  } else {
    mctx.beginPath(); mctx.arc(bx,by,bR,0,Math.PI*2);
    mctx.fillStyle='rgba(242,184,48,.9)'; mctx.fill();
    mctx.font=`bold ${Math.max(7,s*.12*sc)}px sans-serif`;
    mctx.fillStyle='#fff'; mctx.textAlign='center'; mctx.textBaseline='middle';
    mctx.fillText(num, bx, by);
  }
  // 관심사 아이콘 (뱃지 오른쪽 하단)
  if(room.interest){
    const iR = bRBase * 0.35;
    const ix = bx + bR * 0.65, iy = by + bR * 0.65;
    const iImg = getInterestImgForMap(room.interest);
    mctx.beginPath(); mctx.arc(ix,iy,iR+1.5,0,Math.PI*2);
    mctx.fillStyle='white'; mctx.fill();
    if(iImg){
      drawCircleImg(mctx, iImg, ix, iy, iR);
    } else {
      // 로드 전 플레이스홀더
      mctx.beginPath(); mctx.arc(ix,iy,iR,0,Math.PI*2);
      mctx.fillStyle='rgba(200,200,200,0.8)'; mctx.fill();
    }
  }
  // 호버 중이면 트위터ID 툴팁 표시
  if(MAP_HOVER.num===num){
    const label = `@${room.twitterId}`;
    mctx.font=`bold ${Math.max(9,s*.13)}px 'Noto Sans KR',sans-serif`;
    const lw = mctx.measureText(label).width + 16;
    const lh = Math.max(18, s*.2);
    const lx = bx + bR + 6;
    const ly = by - lh/2;
    mctx.beginPath(); mctx.roundRect(lx, ly, lw, lh, lh/2);
    mctx.fillStyle='rgba(30,20,10,.72)'; mctx.fill();
    mctx.fillStyle='#fff'; mctx.textAlign='left'; mctx.textBaseline='middle';
    mctx.fillText(label, lx+8, by);
  }
}

// ── Supabase Realtime 구독 (rooms 테이블 INSERT/UPDATE 감지) ──
function subscribeRooms(){
  const wsUrl = SUPA_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPA_KEY + '&vsn=1.0.0';
  let ws, heartbeat, reconnectTimer;

  function connect(){
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      console.log('🔴 Realtime 연결됨');
      // 채널 join
      ws.send(JSON.stringify({
        topic: 'realtime:public:rooms',
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, presence: { key: '' } } },
        ref: '1'
      }));
      // 30초마다 heartbeat
      heartbeat = setInterval(() => {
        ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: null }));
      }, 30000);
    };

    ws.onmessage = async (e) => {
      try {
        const msg = JSON.parse(e.data);
        // INSERT 또는 UPDATE 이벤트
        if(msg.event === 'INSERT' || msg.event === 'UPDATE'){
          const row = msg.payload?.record;
          if(row && row.occupied === 'Y'){
            console.log(`📦 Realtime: ${msg.event} room #${row.room_number}`);
            await loadOneRoom(row);
          }
        }
        // DELETE 이벤트
        if(msg.event === 'DELETE'){
          const old = msg.payload?.old_record;
          if(old?.room_number){
            delete ROOMS[old.room_number];
            drawMap();
            loadResidentCount();
          }
        }
      } catch(err){ /* ignore parse errors */ }
    };

    ws.onerror = (e) => console.warn('Realtime 오류:', e);

    ws.onclose = () => {
      clearInterval(heartbeat);
      console.log('🔴 Realtime 끊김 — 5초 후 재연결');
      reconnectTimer = setTimeout(connect, 5000);
    };
  }

  connect();
}

function drawEmptyGrid(cx,cy,s){
  mHex(cx,cy,s-1);
  mctx.strokeStyle='#efefef';
  mctx.lineWidth=1;
  mctx.stroke();
}

// 별 반짝임 애니메이션 루프
let starRAF = null;
function startStarAnim(){
  if(starRAF) return;
  function tick(){ starRAF = requestAnimationFrame(tick); drawMap(); }
  starRAF = requestAnimationFrame(tick);
}
function stopStarAnim(){ if(starRAF){ cancelAnimationFrame(starRAF); starRAF=null; } }

function zoomIn(){mScale=Math.min(mScale*1.2,3);drawMap();}
function zoomOut(){mScale=Math.max(mScale/1.2,.3);drawMap();}
function resetView(){mScale=1;mOX=0;mOY=0;drawMap();}

// ── 뱃지 스케일 애니메이션 ──
function startBadgeAnim(){
  if(BADGE_RAF) return; // 이미 실행 중
  function tick(){
    let needMore = false;
    for(let num=1;num<=50;num++){
      if(!ROOMS[num]) continue;
      const target = MAP_HOVER.num===num ? 2.0 : 1.0;
      const cur = BADGE_SCALE[num] || 1.0;
      const diff = target - cur;
      if(Math.abs(diff) < 0.01){
        BADGE_SCALE[num] = target;
      } else {
        BADGE_SCALE[num] = cur + diff * 0.18; // 이징 속도
        needMore = true;
      }
    }
    drawMap();
    if(needMore){
      BADGE_RAF = requestAnimationFrame(tick);
    } else {
      BADGE_RAF = null;
    }
  }
  BADGE_RAF = requestAnimationFrame(tick);
}

mCV.addEventListener('wheel',e=>{e.preventDefault();mScale=Math.max(.3,Math.min(3,mScale*(e.deltaY>0?.9:1.1)));drawMap();},{passive:false});
mCV.addEventListener('mousedown',e=>{isDrag=true;dSt={x:e.clientX,y:e.clientY};dOff={x:mOX,y:mOY};mCV.classList.add('drag');});
window.addEventListener('mousemove',e=>{
  if(isDrag){mOX=dOff.x+(e.clientX-dSt.x);mOY=dOff.y+(e.clientY-dSt.y);drawMap();return;}
  // 뱃지 호버 감지
  const rect=mCV.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const s=HEX*mScale;
  let found=null;
  for(let num=1;num<=50;num++){
    const room=ROOMS[num]; if(!room) continue;
    const pos=SLOT_POS[num]; if(!pos) continue;
    const{x:cx,y:cy}=ap(pos.q,pos.r);
    const bR=Math.max(10,s*.16), bx=cx-s*.58, by=cy-s*.56;
    const dist=Math.sqrt((mx-bx)**2+(my-by)**2);
    if(dist<=bR+4){ found={num,bx,by,bR}; break; }
  }
  const prevNum=MAP_HOVER.num;
  MAP_HOVER=found||{num:null,bx:0,by:0,bR:0};
  mCV.style.cursor=found?'pointer':'default';
  if((found?.num||null)!==prevNum) startBadgeAnim(); // 호버 변경 시 애니메이션 시작
});
window.addEventListener('mouseup',()=>{isDrag=false;mCV.classList.remove('drag');});
mCV.addEventListener('click',e=>{
  if(isDrag) return;
  const rect=mCV.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const s=HEX*mScale;
  for(let num=1;num<=50;num++){
    const room=ROOMS[num]; if(!room) continue;
    const pos=SLOT_POS[num]; if(!pos) continue;
    const{x:cx,y:cy}=ap(pos.q,pos.r);
    const bR=Math.max(10,s*.16), bx=cx-s*.58, by=cy-s*.56;
    const dist=Math.sqrt((mx-bx)**2+(my-by)**2);
    if(dist<=bR+4){
      window.open(`https://x.com/${room.twitterId}`,'_blank');
      return;
    }
  }
});

// 초기화
window.addEventListener('resize',resizeMap);
startStarAnim(); // 별 반짝임 시작
renderRoom(); updateProg(); resizeMap();
initAuth();    // Google 로그인 상태 복원
loadAssets();  // Supabase에서 에셋 로드
loadInterests(); // Supabase에서 관심사 목록 로드
loadRooms();   // Supabase에서 기존 방 로드
subscribeRooms(); // Supabase Realtime 구독
</script>
